name: windows-build-test

on:
  push:
  pull_request:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        id: setup-miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: spatial_env
          auto-activate-base: false
          miniconda-version: "latest"
          python-version: "3.11"

      - name: Create environment
        shell: pwsh
        run: |
          conda create -n spatial_env python=3.11 -y

      - name: Install Python dependencies
        shell: pwsh
        run: |
          conda run -n spatial_env python -m pip install -r requirements.txt
          conda run -n spatial_env conda install -c conda-forge proj libcurl numpy scipy -y

      - name: Bootstrap vcpkg and install PhysX
        shell: pwsh
        run: |
          if (-not (Test-Path .\dependencies)) { New-Item -ItemType Directory -Path .\dependencies | Out-Null }
          if (-not (Test-Path .\dependencies\vcpkg)) {
            git clone https://github.com/microsoft/vcpkg.git .\dependencies\vcpkg
          }
          if (-not (Test-Path .\dependencies\vcpkg\vcpkg.exe)) {
            & .\dependencies\vcpkg\bootstrap-vcpkg.bat
          }
          & .\dependencies\vcpkg\vcpkg.exe install physx:x64-windows

      - name: Detect conda
        id: detect-conda
        shell: pwsh
        run: |
          $condaRoot = ""
          if (Get-Command conda -ErrorAction SilentlyContinue) {
            $condaExe = (Get-Command conda).Source
            $condaRoot = Split-Path (Split-Path $condaExe)
            Write-Host "Found conda via PATH: $condaRoot"
          } elseif ($env:CONDA_PREFIX) {
            $condaRoot = Split-Path $env:CONDA_PREFIX
            Write-Host "Found conda via CONDA_PREFIX: $condaRoot"
          } else {
            Write-Host "ERROR: conda not found!"
            Write-Host "CONDA=$env:CONDA"
            Write-Host "CONDA_PREFIX=$env:CONDA_PREFIX"
            Write-Host "PATH=$env:PATH"
            exit 1
          }
          echo "CONDA_ROOT=$condaRoot" >> $env:GITHUB_OUTPUT

      - name: Configure and build
        shell: pwsh
        run: |
          $condaRoot = "${{ steps.detect-conda.outputs.CONDA_ROOT }}"
          $envPython = "$condaRoot\envs\spatial_env\python.exe"
          $toolchain = ".\dependencies\vcpkg\scripts\buildsystems\vcpkg.cmake"

          Write-Host "CondaRoot: $condaRoot"
          Write-Host "Python: $envPython"
          Write-Host "Toolchain exists: $(Test-Path $toolchain)"

          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DPython_EXECUTABLE="$envPython" `
            -DPython_ROOT_DIR="$condaRoot\envs\spatial_env" `
            -DPYTHON_ROOT="$condaRoot\envs\spatial_env" `
            -DCONDA_ENV_PATH="$condaRoot\envs\spatial_env"

          if ($LASTEXITCODE -ne 0) { throw "cmake configure failed" }

          cmake --build build --config Release --parallel 16
          if ($LASTEXITCODE -ne 0) { throw "cmake build failed" }

      - name: Smoke test
        shell: pwsh
        run: |
          $condaRoot = "${{ steps.detect-conda.outputs.CONDA_ROOT }}"
          $envPython = "$condaRoot\envs\spatial_env\python.exe"
          $physxBin = ".\dependencies\vcpkg\installed\x64-windows\bin"
          $env:PATH = "$physxBin;$condaRoot\envs\spatial_env;$condaRoot\envs\spatial_env\Library\bin;$condaRoot\envs\spatial_env\Scripts;$env:PATH"

          & $envPython -c "import pathlib,sys; sys.path.insert(0,str(pathlib.Path.cwd()/'python')); import spatial_db; print('HAS_NATIVE_MODULE =',spatial_db.HAS_NATIVE_MODULE); print('init_physx =',spatial_db.native.init_physx(0))"

      - name: Run tests
        shell: pwsh
        run: |
          conda run -n spatial_env python -m pytest tests -q
