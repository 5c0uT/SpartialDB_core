name: windows-build-test

on:
  push:
  pull_request:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-test:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: spatial_env
          auto-activate-base: false
          miniconda-version: "latest"
          python-version: "3.11"

      - name: Create environment
        run: |
          conda create -n spatial_env python=3.11 -y

      - name: Install Python dependencies
        run: |
          conda run -n spatial_env python -m pip install -r requirements.txt
          conda run -n spatial_env conda install -c conda-forge proj libcurl numpy scipy -y

      - name: Bootstrap vcpkg and install PhysX
        run: |
          mkdir -p dependencies
          if [ ! -d dependencies/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git dependencies/vcpkg
          fi
          if [ ! -f dependencies/vcpkg/vcpkg.exe ]; then
            cmd //c "dependencies\\vcpkg\\bootstrap-vcpkg.bat"
          fi
          ./dependencies/vcpkg/vcpkg.exe install physx:x64-windows

      - name: Build and test
        run: |
          CONDA_ROOT=$(cygpath "$CONDA")
          ENV_PYTHON="$CONDA_ROOT/envs/spatial_env/python.exe"
          TOOLCHAIN="$CONDA_ROOT/../../dependencies/vcpkg/scripts/buildsystems/vcpkg.cmake"
          BUILD_DIR="build"

          echo "CondaRoot: $CONDA_ROOT"
          echo "Python: $ENV_PYTHON"

          cmake -S . -B "$BUILD_DIR" -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_TOOLCHAIN_FILE="dependencies/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DPython_EXECUTABLE="$ENV_PYTHON" \
            -DPython_ROOT_DIR="$CONDA_ROOT/envs/spatial_env" \
            -DPYTHON_ROOT="$CONDA_ROOT/envs/spatial_env" \
            -DCONDA_ENV_PATH="$CONDA_ROOT/envs/spatial_env"

          cmake --build "$BUILD_DIR" --config Release --parallel 16

          export PATH="dependencies/vcpkg/installed/x64-windows/bin:$CONDA_ROOT/envs/spatial_env:$CONDA_ROOT/envs/spatial_env/Library/bin:$CONDA_ROOT/envs/spatial_env/Scripts:$PATH"

          "$ENV_PYTHON" -c "import pathlib,sys; sys.path.insert(0,str(pathlib.Path.cwd()/'python')); import spatial_db; print('HAS_NATIVE_MODULE =',spatial_db.HAS_NATIVE_MODULE); print('init_physx =',spatial_db.native.init_physx(0))"

          conda run -n spatial_env python -m pytest tests -q
