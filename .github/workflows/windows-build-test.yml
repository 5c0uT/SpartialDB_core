name: windows-build-test

on:
  push:
  pull_request:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        id: setup-miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: spatial_env
          auto-activate-base: false
          miniconda-version: "latest"
          python-version: "3.11"

      - name: Create environment
        shell: pwsh
        run: |
          conda create -n spatial_env python=3.11 -y

      - name: Install Python dependencies
        shell: pwsh
        run: |
          conda run -n spatial_env python -m pip install -r requirements.txt
          conda run -n spatial_env conda install -c conda-forge proj libcurl numpy scipy -y

      - name: Bootstrap vcpkg and install PhysX
        shell: pwsh
        run: |
          if (-not (Test-Path .\dependencies)) { New-Item -ItemType Directory -Path .\dependencies | Out-Null }
          if (-not (Test-Path .\dependencies\vcpkg)) {
            git clone https://github.com/microsoft/vcpkg.git .\dependencies\vcpkg
          }
          if (-not (Test-Path .\dependencies\vcpkg\vcpkg.exe)) {
            & .\dependencies\vcpkg\bootstrap-vcpkg.bat
          }
          & .\dependencies\vcpkg\vcpkg.exe install physx:x64-windows

      - name: Build
        shell: pwsh
        run: |
          # Detect conda
          $condaRoot = ""
          if ($env:CONDA -and (Test-Path $env:CONDA)) {
            $p = $env:CONDA
            if (Test-Path $p -PathType Leaf) { $p = Split-Path (Split-Path $p) }
            $condaRoot = $p.Trim()
          } elseif ($env:CONDA_PREFIX) {
            $condaRoot = (Split-Path $env:CONDA_PREFIX).Trim()
          } elseif (Get-Command conda -ErrorAction SilentlyContinue) {
            $condaRoot = (Split-Path (Split-Path (Get-Command conda).Source)).Trim()
          } else {
            foreach ($p in @("$env:USERPROFILE\miniconda3", "$env:USERPROFILE\anaconda3", "C:\Miniconda", "C:\Miniconda3", "C:\ProgramData\Miniconda3")) {
              if (Test-Path "$p\Scripts\conda.exe") { $condaRoot = $p.Trim(); break }
            }
          }
          if (-not $condaRoot) { throw "conda not found! CONDA=$env:CONDA CONDA_PREFIX=$env:CONDA_PREFIX" }
          Write-Host "CondaRoot: $condaRoot"
          Write-Host "Python: $envPython (exists: $(Test-Path $envPython))"
          Write-Host "Toolchain: $toolchain (exists: $(Test-Path $toolchain))"

          # Check cmake availability
          Write-Host ""
          Write-Host "=== cmake check ==="
          $cmakePath = Get-Command cmake -ErrorAction SilentlyContinue
          if ($cmakePath) {
            Write-Host "cmake found at: $($cmakePath.Source)"
            & cmake --version
          } else {
            Write-Host "cmake NOT found in PATH!"
            Write-Host "PATH: $env:PATH"
            throw "cmake not found"
          }

          # Build
          cmake --build build --config Release --parallel 16 2>&1
          if ($LASTEXITCODE -ne 0) { throw "cmake build failed" }

      - name: Smoke test
        shell: pwsh
        run: |
          $condaRoot = ""
          if ($env:CONDA -and (Test-Path $env:CONDA)) {
            $p = $env:CONDA; if (Test-Path $p -PathType Leaf) { $p = Split-Path (Split-Path $p) }; $condaRoot = $p.Trim()
          } elseif (Get-Command conda -ErrorAction SilentlyContinue) {
            $condaRoot = (Split-Path (Split-Path (Get-Command conda).Source)).Trim()
          }
          $envPython = Join-Path $condaRoot "envs\spatial_env\python.exe"
          $physxBin = ".\dependencies\vcpkg\installed\x64-windows\bin"
          $env:PATH = "$physxBin;$condaRoot\envs\spatial_env;$condaRoot\envs\spatial_env\Library\bin;$condaRoot\envs\spatial_env\Scripts;$env:PATH"
          & $envPython -c "import pathlib,sys; sys.path.insert(0,str(pathlib.Path.cwd()/'python')); import spatial_db; print('HAS_NATIVE_MODULE =',spatial_db.HAS_NATIVE_MODULE); print('init_physx =',spatial_db.native.init_physx(0))"

      - name: Run tests
        shell: pwsh
        run: |
          conda run -n spatial_env python -m pytest tests -q
